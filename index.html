<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace Chatbot</title>
    <meta name="description" content="AI Chatbot with text generation and image generation." />
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h1>AI Assistant</h1>
            <p>Powered by Mistral & Stable Diffusion</p>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="message bot-message">
                <div class="message-content">Hello! I'm your AI assistant. You can ask me anything or type a prompt and click 'Generate Image' to create an image!</div>
            </div>
            
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <span></span><span></span><span></span>
            </div>
        </main>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message or prompt..." autocomplete="off" />
            <div class="button-group">
                <button id="sendBtn" class="btn primary-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                    Send
                </button>
                <button id="imageBtn" class="btn secondary-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    Generate Image
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
